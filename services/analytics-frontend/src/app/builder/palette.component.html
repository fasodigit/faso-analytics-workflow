<div class="fd-palette">
  <h3 class="fd-palette-title">Palette</h3>
  <div
    *ngFor="let section of sections"
    class="fd-palette-section"
    cdkDropList
    [cdkDropListData]="section.items"
    [cdkDropListConnectedTo]="['fd-canvas-drop']"
    [cdkDropListSortingDisabled]="true"
  >
    <div class="fd-palette-section-title">{{ section.category }}</div>
    <div
      *ngFor="let item of section.items"
      class="fd-palette-item"
      [attr.data-kind]="item.kind"
      cdkDrag
      [cdkDragData]="item"
    >
      <div class="fd-palette-item-label">{{ item.label }}</div>
      <div *ngIf="item.description" class="fd-palette-item-desc">
        {{ item.description }}
      </div>
      <div *cdkDragPreview class="fd-palette-item fd-palette-item-preview">
        {{ item.label }}
      </div>
    </div>
  </div>
</div>
